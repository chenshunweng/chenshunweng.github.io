<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chenshun Weng • Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 页头 -->
  <header class="header">
    <div class="header-left">
      <h1 class="logo">Chenshun Weng</h1>
      <p class="tagline">Systems Engineer | Robotik | Simulation</p>
    </div>
    <div class="header-right">
      <!-- 语言切换 -->
      <select id="lang-switcher">
        <option value="de">DE</option>
        <option value="en">EN</option>
        <option value="zh">中文</option>
      </select>
      <!-- 暗黑/明亮切换 -->
      <button id="theme-toggle" class="btn-theme">🌙</button>
      <!-- 简历下载 -->
      <a class="btn-resume" href="Lebenslauf_Chenshun_Weng.pdf" target="_blank">📄 简历下载</a>
    </div>
  </header>

  <div class="container">
    <!-- 关于我 -->
    <section class="about">
      <h2>Über mich</h2>
      <p>Zuverlässiger Ingenieur mit Schwerpunkt Automatisierung und Robotik. Ich entwickle smarte Automations- und Simulationslösungen für Industrie 4.0.</p>
    </section>

    <!-- 项目展示（由 JS 动态渲染） -->
    <main>
      <section id="projects" class="projects">
        <!-- app.js 会把每个项目的卡片插入到这里 -->
      </section>
    </main>
  </div>

  <!-- Modal 弹窗 -->
  <div id="modal" class="modal">
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <h2 id="modal-title"></h2>
      <p id="modal-desc"></p>
      <div id="modal-video-container"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
