<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chenshun Weng – Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      color: #333;
    }
    header {
      background-color: #1f2937;
      color: white;
      padding: 40px 20px;
      text-align: center;
    }
    .lang-switch {
      position: absolute;
      top: 20px;
      right: 20px;
    }
    .lang-switch button {
      margin-left: 5px;
      padding: 5px 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    nav {
      background-color: #374151;
      padding: 10px;
      text-align: center;
    }
    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .section-title {
      text-align: center;
      font-size: 2em;
      margin-bottom: 20px;
    }
    .about {
      text-align: center;
      margin-bottom: 40px;
    }
    .download-button {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background-color: #1f2937;
      color: white;
      border-radius: 5px;
      text-decoration: none;
    }
    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }
