<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chenshun Weng Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/i18next@23.6.0/i18next.min.js"></script>
</head>
<body>
  <header>
    <h1 data-i18n="header.name">Chenshun Weng</h1>
    <p data-i18n="header.tagline">Systems Engineer | Robotik | Simulation</p>
    <div class="controls">
      <div class="lang-switch">
        <button data-lang="de">DE</button>
        <button data-lang="en">EN</button>
        <button data-lang="zh">中文</button>
      </div>
      <button class="theme-toggle">🌙</button>
    </div>
  </header>

  <main class="container">
    <section class="about">
      <h2 data-i18n="about.title">About Me</h2>
      <p data-i18n="about.text">Description loading...</p>
      <div class="cv-download">
        <a href="Lebenslauf_Chenshun_Weng.pdf" download data-i18n="about.cv">📄 Download CV (PDF)</a>
      </div>
    </section>

    <section class="projects">
      <h2 data-i18n="projects.title">Projects</h2>

      <div class="project-year">
        <div class="year-label">2025</div>
        <div class="projects-row">
          <div class="card" data-key="bsh">
            <img src="assets/images/bsh_project.png" alt="BSH">
            <h3 data-i18n="projects.bsh.title">BSH Project</h3>
            <p data-i18n="projects.bsh.desc">Test automation</p>
          </div>
        </div>
      </div>

      <!-- Add other years/projects here... -->

    </section>
  </main>

  <footer>
    <p>&copy; 2025 Chenshun Weng – <span data-i18n="footer.portfolio">Portfolio</span></p>
  </footer>

  <div id="modal" class="modal">
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script>
    function updateTexts() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        el.textContent = i18next.t(el.getAttribute('data-i18n'));
      });
    }

    i18next.init({
      lng: 'de',
      debug: true,
      resources: {
        de: {
          translation: {} // placeholder, you should import JSON here
        },
        en: {
          translation: {}
        },
        zh: {
          translation: {}
        }
      }
    }, function(err, t) {
      updateTexts();

      document.querySelectorAll('.lang-switch button').forEach(btn => {
        btn.addEventListener('click', () => {
          i18next.changeLanguage(btn.dataset.lang, updateTexts);
        });
      });

      const modal = document.getElementById('modal');
      const modalBody = document.getElementById('modal-body');
      const closeBtn = modal.querySelector('.modal-close');

      document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => {
          const key = card.dataset.key;
          const proj = i18next.t(`projects.${key}`, { returnObjects: true });
          modalBody.innerHTML = `<h2>${proj.title}</h2><p>${proj.long || ''}</p>`;
          modal.style.display = 'flex';
        });
      });

      closeBtn.addEventListener('click', () => modal.style.display = 'none');
      modal.addEventListener('click', e => {
        if (e.target === modal) modal.style.display = 'none';
      });

      const themeBtn = document.querySelector('.theme-toggle');
      themeBtn.addEventListener('click', () => {
        const root = document.documentElement;
        const nextTheme = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        root.setAttribute('data-theme', nextTheme);
        themeBtn.textContent = nextTheme === 'dark' ? '☀️' : '🌙';
      });
    });
  </script>
</body>
</html>
